<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/logo.png" type="image/png">
  <meta name="description" content="환자 관리 — 고객 정보와 시뮬레이션 이력을 Supabase DB에서 관리합니다.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환자 관리 — Smile Vision AI</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .type-tab {
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-tertiary);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all var(--duration) var(--ease);
    }
    .type-tab:hover { color: var(--text-primary); }
    .type-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .patients-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 0 14px;
      flex: 1;
      max-width: 360px;
    }
    .search-box input {
      border: none;
      outline: none;
      padding: 10px 0;
      width: 100%;
      font-size: 0.875rem;
      background: transparent;
    }
    .search-box-icon { color: var(--text-tertiary); font-size: 1rem; }

    .filter-chips {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px;
    }
    .chip {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 600;
      border: 1.5px solid var(--gray-200);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration) var(--ease);
    }
    .chip:hover, .chip.active { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }

    .patient-row { cursor: pointer; }
    .patient-row:hover td { background: var(--primary-bg) !important; }

    .patient-name-cell { display: flex; align-items: center; gap: 12px; }
    .patient-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 700;
      color: #FFF; flex-shrink: 0;
    }

    .score-bar {
      width: 80px; height: 6px;
      background: var(--gray-200);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    .score-bar-fill { height: 100%; border-radius: 3px; }

    /* Detail Panel */
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 560px;
      background: var(--surface);
      box-shadow: var(--shadow-xl);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.3s var(--ease);
      overflow-y: auto;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }

    .detail-header {
      padding: 24px; border-bottom: 1px solid var(--gray-200);
      display: flex; justify-content: space-between; align-items: center;
    }
    .detail-body { padding: 24px; }
    .detail-section { margin-bottom: 28px; }
    .detail-section h4 { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-100); }

    .detail-info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .detail-info-item label {
      font-size: 0.75rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em;
    }
    .detail-info-item div { font-size: 0.9375rem; font-weight: 600; margin-top: 4px; }

    .score-detail {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--gray-100);
    }
    .score-detail:last-child { border: none; }

    .timeline-item {
      position: relative; padding-left: 28px; padding-bottom: 20px;
    }
    .timeline-item::before {
      content: '';
      position: absolute; left: 8px; top: 8px; bottom: 0;
      width: 2px; background: var(--gray-200);
    }
    .timeline-item:last-child::before { display: none; }
    .timeline-dot {
      position: absolute; left: 0; top: 6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--primary); border: 3px solid var(--primary-bg);
    }
    .timeline-date { font-size: 0.75rem; color: var(--text-tertiary); }
    .timeline-text { font-size: 0.875rem; color: var(--text-secondary); margin-top: 4px; }

    /* Simulation images */
    .sim-card {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .sim-card-header {
      padding: 12px 16px;
      background: var(--gray-50);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8125rem;
    }
    .sim-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: var(--gray-200);
    }
    .sim-img-wrap {
      position: relative;
      background: #000;
    }
    .sim-img-wrap img {
      width: 100%;
      display: block;
    }
    .sim-img-label {
      position: absolute;
      top: 8px; left: 8px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 0.6875rem;
      font-weight: 700;
      color: #FFF;
    }
    .sim-img-label.before { background: rgba(0,0,0,0.6); }
    .sim-img-label.after { background: rgba(0,212,170,0.85); }
    .sim-scores {
      display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap;
    }
    .sim-score-chip {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.6875rem;
      font-weight: 700;
    }
    .sim-no-data {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.875rem;
    }
    .detail-loading {
      text-align: center; padding: 20px;
    }

    @media (max-width: 768px) {
      .patients-toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: none; }
      .detail-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout" id="app">
    <div class="main">
      <header class="header">
        <div class="flex items-center gap-12">
          <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
          <span class="header-title">환자 관리</span>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary btn-sm" onclick="openModal('addPatientModal')">+ 새 환자</button>
        </div>
      </header>

      <div class="content">
        <!-- Toolbar -->
        <div class="patients-toolbar">
          <div class="search-box">
            <span class="search-box-icon">&#x1F50D;</span>
            <input type="text" id="searchInput" placeholder="환자명, 전화번호 검색..." oninput="filterPatients()">
          </div>
          <div class="flex gap-8">
            <button class="btn btn-sm btn-secondary">&#x1F4E5; 내보내기</button>
          </div>
        </div>

        <!-- 분석 유형 탭 -->
        <div style="display:flex; gap:0; margin-top:16px; border-bottom:2px solid var(--gray-200);">
          <button class="type-tab active" id="tabAll" onclick="filterByType('all', this)">전체</button>
          <button class="type-tab" id="tabLaminate" onclick="filterByType('laminate', this)">&#x1F9B7; 라미네이트</button>
          <button class="type-tab" id="tabOrtho" onclick="filterByType('orthodontics', this)">&#x1FA7B; 교정·교열·교합</button>
        </div>

        <div class="filter-chips" style="margin-top:12px;">
          <button class="chip active" onclick="filterByStatus(this, 'all')">전체</button>
          <button class="chip" onclick="filterByStatus(this, '상담대기')">상담대기</button>
          <button class="chip" onclick="filterByStatus(this, '상담중')">상담중</button>
          <button class="chip" onclick="filterByStatus(this, '계약완료')">계약완료</button>
          <button class="chip" onclick="filterByStatus(this, '치료중')">치료중</button>
          <button class="chip" onclick="filterByStatus(this, '치료완료')">치료완료</button>
        </div>

        <!-- KPI -->
        <div class="kpi-grid mt-24">
          <div class="kpi-card">
            <div class="kpi-label">전체 환자</div>
            <div class="kpi-value">248</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">오늘 신규</div>
            <div class="kpi-value" style="color:var(--success);">8</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">상담 대기</div>
            <div class="kpi-value" style="color:var(--warning);">12</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">평균 치아 점수</div>
            <div class="kpi-value">61</div>
          </div>
        </div>

        <!-- Table -->
        <div class="card mt-24">
          <div class="card-body" style="padding:0;">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>환자</th>
                    <th>연락처</th>
                    <th>치료유형</th>
                    <th>치아점수</th>
                    <th>상태</th>
                    <th>최근방문</th>
                  </tr>
                </thead>
                <tbody id="patientTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailName">환자명</h3>
      <button class="btn btn-sm btn-secondary" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- Add Patient Modal -->
  <div class="modal-overlay" id="addPatientModal">
    <div class="modal">
      <div class="modal-header"><h3>새 환자 등록</h3></div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" class="form-input" id="newName" placeholder="홍길동">
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">나이</label>
            <input type="number" class="form-input" id="newAge" placeholder="30">
          </div>
          <div class="form-group">
            <label class="form-label">성별</label>
            <select class="form-input" id="newGender">
              <option value="남">남</option>
              <option value="여">여</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">연락처</label>
          <input type="tel" class="form-input" id="newPhone" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label class="form-label">치료유형</label>
          <select class="form-input" id="newTreatment">
            <option>라미네이트</option>
            <option>치아미백</option>
            <option>임플란트</option>
            <option>교정</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addPatientModal')">취소</button>
        <button class="btn btn-primary" onclick="addPatient()">등록</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('patients'));

    let patients = [];
    let activeFilter = 'all';
    let activeType = 'all';
    let usingSupabase = false;

    // Supabase 연결 시 실제 데이터 로드
    async function loadFromSupabase() {
      if (!SupabaseDB.isReady()) return;
      try {
        const data = await SupabaseDB.getPatients({ limit: 200 });
        patients = (data || []).map(p => ({
          id: p.id,
          name: p.name,
          age: p.age || '-',
          phone: p.phone || '-',
          gender: p.gender || '-',
          status: '상담대기',
          lastVisit: p.created_at?.split('T')[0] || '-',
          score: 0,
          treatment: '-',
          _sims: p.simulations,
        }));
        // 시뮬레이션이 있는 환자는 최신 점수와 상태 반영
        for (const p of patients) {
          if (!p._sims) continue;
          try {
            const sims = await SupabaseDB.getSimulations({ patientId: p.id, limit: 1 });
            if (sims.length > 0) {
              const s = sims[0];
              p.score = s.total_score || 0;
              p.status = s.status || '촬영완료';
              p.lastVisit = s.created_at?.split('T')[0] || p.lastVisit;
              p.analysisType = s.analysis_type || 'laminate';
              p.treatment = s.analysis_type === 'orthodontics' ? '교정·교열·교합' : '라미네이트';
            }
          } catch {}
        }
        usingSupabase = true;
        renderTable(patients);
        updateKPI();
      } catch (e) {
        console.warn('Supabase 로드 실패:', e.message);
        renderTable([]);
        updateKPI();
      }
    }

    function updateKPI() {
      const kpis = document.querySelectorAll('.kpi-value');
      if (kpis[0]) kpis[0].textContent = patients.length;
      if (kpis[1]) kpis[1].textContent = patients.filter(p => p.lastVisit === new Date().toISOString().split('T')[0]).length;
      if (kpis[2]) kpis[2].textContent = patients.filter(p => p.status === '상담대기').length;
      if (kpis[3]) kpis[3].textContent = patients.length > 0 ? Math.round(patients.reduce((s,p) => s + (p.score||0), 0) / patients.length) : 0;
    }

    // 페이지 로드 후 Supabase에서 로드
    setTimeout(loadFromSupabase, 500);

    const avatarColors = ['#0066FF', '#00D4AA', '#8B5CF6', '#F59E0B', '#EF4444', '#EC4899'];
    const statusConfig = {
      '상담대기': { bg: '#FEF3C7', color: '#92400E' },
      '상담중': { bg: '#EBF3FF', color: '#0066FF' },
      '계약완료': { bg: '#D1FAE5', color: '#065F46' },
      '치료중': { bg: '#EDE9FE', color: '#7C3AED' },
      '치료완료': { bg: '#F1F5F9', color: '#475569' },
    };

    function renderTable(list) {
      const tbody = document.getElementById('patientTable');
      if (!list || list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:48px 20px; color:var(--text-tertiary);">
          <div style="font-size:2rem; margin-bottom:12px;">&#x1F465;</div>
          등록된 환자가 없습니다.<br>
          <button class="btn btn-primary btn-sm" style="margin-top:16px;" onclick="openModal('addPatientModal')">+ 새 환자 등록</button>
          <span style="display:block; margin-top:8px; font-size:0.75rem;">또는 <a href="simulator.html" style="color:var(--primary);">AI 시뮬레이터</a>에서 촬영 후 저장하면 자동 등록됩니다.</span>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((p, i) => {
        const sc = statusConfig[p.status] || { bg: '#F1F5F9', color: '#475569' };
        const ac = avatarColors[i % avatarColors.length];
        const scoreColor = p.score >= 70 ? 'var(--success)' : p.score >= 50 ? 'var(--warning)' : 'var(--danger)';
        return `<tr class="patient-row" onclick="openDetail('${p.id}')">
          <td>
            <div class="patient-name-cell">
              <div class="patient-avatar" style="background:${ac};">${p.name.charAt(0)}</div>
              <div>
                <strong>${p.name}</strong>
                <div style="font-size:0.75rem; color:var(--text-tertiary);">${p.gender} / ${p.age}세</div>
              </div>
            </div>
          </td>
          <td>${p.phone}</td>
          <td>${p.treatment}</td>
          <td>
            <div class="score-bar"><div class="score-bar-fill" style="width:${p.score}%; background:${scoreColor};"></div></div>
            <strong>${p.score}</strong>
          </td>
          <td><span class="badge" style="background:${sc.bg}; color:${sc.color};">${p.status}</span></td>
          <td>${p.lastVisit}</td>
        </tr>`;
      }).join('');
    }

    function filterPatients() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      let filtered = patients;
      // 유형 필터
      if (activeType === 'laminate') filtered = filtered.filter(p => p.analysisType !== 'orthodontics');
      else if (activeType === 'orthodontics') filtered = filtered.filter(p => p.analysisType === 'orthodontics');
      // 상태 필터
      if (activeFilter !== 'all') filtered = filtered.filter(p => p.status === activeFilter);
      // 검색
      if (query) filtered = filtered.filter(p => p.name.includes(query) || p.phone.includes(query));
      renderTable(filtered);
      updateKPI();
    }

    function filterByType(type, el) {
      document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      activeType = type;
      filterPatients();
    }

    function filterByStatus(el, status) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      activeFilter = status;
      filterPatients();
    }

    async function openDetail(id) {
      const p = patients.find(x => x.id === id);
      if (!p) return;

      document.getElementById('detailName').textContent = p.name;
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('detailOverlay').classList.add('open');

      const scoreColor = s => s >= 70 ? 'var(--success)' : s >= 50 ? 'var(--warning)' : 'var(--danger)';

      // 기본 정보 먼저 표시
      document.getElementById('detailBody').innerHTML = `
        <div class="detail-section">
          <h4>기본 정보</h4>
          <div class="detail-info-grid">
            <div class="detail-info-item"><label>환자 ID</label><div style="font-size:0.75rem;">${p.id?.substring(0,8) || '-'}...</div></div>
            <div class="detail-info-item"><label>성별 / 나이</label><div>${p.gender || '-'} / ${p.age || '-'}세</div></div>
            <div class="detail-info-item"><label>연락처</label><div>${p.phone || '-'}</div></div>
            <div class="detail-info-item"><label>상태</label><div>${p.status || '-'}</div></div>
          </div>
        </div>
        <div id="detailSimulations">
          <div class="detail-loading"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:12px; font-size:0.8125rem;">시뮬레이션 데이터 로딩 중...</p></div>
        </div>
        <div style="display:flex; gap:12px; margin-top:20px;">
          <a href="simulator.html" class="btn btn-primary" style="flex:1; text-align:center;">AI 시뮬레이션</a>
          <a href="chatbot.html" class="btn btn-accent" style="flex:1; text-align:center;">AI 상담</a>
        </div>
      `;

      // Supabase에서 시뮬레이션 데이터 로드
      const simContainer = document.getElementById('detailSimulations');

      if (SupabaseDB.isReady()) {
        try {
          const sims = await SupabaseDB.getSimulations({ patientId: p.id, limit: 10 });

          if (sims.length === 0) {
            simContainer.innerHTML = `
              <div class="sim-no-data">
                <div style="font-size:2rem; margin-bottom:8px;">&#x1F4F7;</div>
                아직 시뮬레이션 기록이 없습니다.<br>
                <a href="simulator.html" style="color:var(--primary); font-weight:600;">AI 시뮬레이터에서 촬영하기</a>
              </div>`;
            return;
          }

          let html = '<h4 style="margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--gray-100);">AI 시뮬레이션 기록 (' + sims.length + '건)</h4>';

          sims.forEach((sim, idx) => {
            const date = sim.created_at ? new Date(sim.created_at).toLocaleString('ko-KR') : '-';
            const hasBefore = sim.before_image_data || sim.before_image_url;
            const styleMap = { natural: '자연형', white: '화이트형', premium: '프리미엄형' };
            const selectedStyle = sim.selected_style || 'natural';

            // After 이미지: 선택된 스타일 우선, 없으면 아무거나
            const afterData = sim['after_' + selectedStyle + '_data'] || sim['after_' + selectedStyle + '_url']
              || sim.after_natural_data || sim.after_natural_url
              || sim.after_white_data || sim.after_white_url
              || sim.after_premium_data || sim.after_premium_url;

            html += `
              <div class="sim-card">
                <div class="sim-card-header">
                  <span style="font-weight:700;">#${sims.length - idx} ${date}</span>
                  <span class="badge badge-primary">${styleMap[selectedStyle] || selectedStyle}</span>
                </div>`;

            // 이미지 영역
            if (hasBefore || afterData) {
              html += `<div class="sim-images">`;
              if (hasBefore) {
                html += `<div class="sim-img-wrap">
                  <img src="${sim.before_image_data || sim.before_image_url}" alt="Before">
                  <span class="sim-img-label before">BEFORE</span>
                </div>`;
              }
              if (afterData) {
                html += `<div class="sim-img-wrap">
                  <img src="${afterData}" alt="After">
                  <span class="sim-img-label after">AFTER</span>
                </div>`;
              }
              html += `</div>`;
            } else {
              html += `<div style="padding:24px; text-align:center; color:var(--text-tertiary); font-size:0.8125rem;">이미지 없음</div>`;
            }

            // 점수 칩
            const scores = {
              '색상': sim.score_whiteness,
              '정렬': sim.score_alignment,
              '대칭': sim.score_symmetry,
              '간격': sim.score_spacing,
              '형태': sim.score_shape,
              '잇몸': sim.score_gumline,
            };

            html += `<div class="sim-scores">`;
            for (const [label, val] of Object.entries(scores)) {
              if (val === null || val === undefined) continue;
              const c = val >= 70 ? '#065F46' : val >= 50 ? '#92400E' : '#991B1B';
              const bg = val >= 70 ? '#D1FAE5' : val >= 50 ? '#FEF3C7' : '#FEE2E2';
              html += `<span class="sim-score-chip" style="background:${bg}; color:${c};">${label} ${val}</span>`;
            }
            html += `</div>`;

            // 종합 점수
            html += `
              <div style="padding:8px 16px 14px; display:flex; gap:12px; align-items:center;">
                <div style="padding:8px 14px; background:var(--primary-bg); border-radius:var(--radius-sm); text-align:center;">
                  <div style="font-size:1.25rem; font-weight:800; color:var(--primary);">${sim.total_score || '-'}</div>
                  <div style="font-size:0.625rem; color:var(--text-tertiary);">현재</div>
                </div>
                <div style="color:var(--text-tertiary);">&#x2192;</div>
                <div style="padding:8px 14px; background:#D1FAE5; border-radius:var(--radius-sm); text-align:center;">
                  <div style="font-size:1.25rem; font-weight:800; color:#065F46;">${sim.predicted_score || '-'}</div>
                  <div style="font-size:0.625rem; color:var(--text-tertiary);">시술 후</div>
                </div>
                <div style="padding:8px 14px; background:#FEF3C7; border-radius:var(--radius-sm); text-align:center;">
                  <div style="font-size:1.25rem; font-weight:800; color:#92400E;">+${(sim.predicted_score||0) - (sim.total_score||0)}</div>
                  <div style="font-size:0.625rem; color:var(--text-tertiary);">개선</div>
                </div>
                <span class="badge" style="background:${statusConfig[sim.status]?.bg || '#F1F5F9'}; color:${statusConfig[sim.status]?.color || '#475569'}; margin-left:auto;">${sim.status || '촬영완료'}</span>
              </div>`;

            // 발견사항
            if (sim.findings && sim.findings.length) {
              html += `<div style="padding:0 16px 14px;">`;
              sim.findings.forEach(f => {
                html += `<div style="font-size:0.75rem; color:var(--text-tertiary); padding:2px 0;">&#x25B6; ${f}</div>`;
              });
              html += `</div>`;
            }

            html += `</div>`; // sim-card end
          });

          // After 스타일 전환 탭 (최신 시뮬레이션에 3종 모두 있을 때)
          const latest = sims[0];
          if (latest && (latest.after_natural_data || latest.after_white_data || latest.after_premium_data)) {
            html += `
              <div class="detail-section" style="margin-top:8px;">
                <h4>최신 시뮬레이션 — 스타일별 비교</h4>
                <div style="display:flex; gap:8px; margin-bottom:12px;">
                  <button class="chip active" onclick="switchDetailStyle('natural', this)">자연형</button>
                  <button class="chip" onclick="switchDetailStyle('white', this)">화이트형</button>
                  <button class="chip" onclick="switchDetailStyle('premium', this)">프리미엄형</button>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:2px; border-radius:var(--radius-md); overflow:hidden;">
                  <div style="position:relative; background:#000;">
                    ${latest.before_image_data ? `<img src="${latest.before_image_data}" style="width:100%; display:block;">` : '<div style="padding:40px; text-align:center; color:#666;">없음</div>'}
                    <span class="sim-img-label before">BEFORE</span>
                  </div>
                  <div style="position:relative; background:#000;">
                    <img id="detailStyleImage" src="${latest.after_natural_data || latest.after_white_data || latest.after_premium_data || ''}" style="width:100%; display:block;">
                    <span class="sim-img-label after">AFTER</span>
                  </div>
                </div>
              </div>`;

            // 스타일 데이터를 전역 변수에 저장
            html += `<script>
              window._latestSimStyles = {
                natural: ${JSON.stringify(latest.after_natural_data || '')},
                white: ${JSON.stringify(latest.after_white_data || '')},
                premium: ${JSON.stringify(latest.after_premium_data || '')}
              };
            <\/script>`;
          }

          simContainer.innerHTML = html;

        } catch (e) {
          console.error('시뮬레이션 로드 실패:', e);
          simContainer.innerHTML = `<div class="sim-no-data" style="color:var(--danger);">시뮬레이션 데이터 로드 실패: ${e.message}</div>`;
        }
      } else {
        // Supabase 미연결 — 샘플 데이터 표시
        simContainer.innerHTML = `
          <div class="detail-section">
            <h4>치아 점수 (샘플)</h4>
            <div style="display:flex; gap:16px; margin-bottom:16px;">
              <div style="flex:1; text-align:center; padding:16px; background:var(--primary-bg); border-radius:var(--radius-md);">
                <div style="font-size:1.75rem; font-weight:800; color:var(--primary);">${p.score || 0}</div>
                <div style="font-size:0.75rem; color:var(--text-tertiary);">현재 점수</div>
              </div>
              <div style="flex:1; text-align:center; padding:16px; background:#D1FAE5; border-radius:var(--radius-md);">
                <div style="font-size:1.75rem; font-weight:800; color:#065F46;">${Math.min(100, (p.score||0) + 30)}</div>
                <div style="font-size:0.75rem; color:var(--text-tertiary);">예상 점수</div>
              </div>
            </div>
            <p style="font-size:0.8125rem; color:var(--text-tertiary);">Supabase 연결 시 실제 시뮬레이션 이미지가 표시됩니다.</p>
          </div>`;
      }
    }

    // 스타일별 After 이미지 전환
    function switchDetailStyle(style, el) {
      document.querySelectorAll('.detail-section .chip').forEach(c => c.classList.remove('active'));
      if (el) el.classList.add('active');
      const img = document.getElementById('detailStyleImage');
      if (img && window._latestSimStyles) {
        const src = window._latestSimStyles[style];
        if (src) img.src = src;
      }
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('detailOverlay').classList.remove('open');
    }

    async function addPatient() {
      const name = document.getElementById('newName').value.trim();
      if (!name) { showToast('이름을 입력하세요', 'warning'); return; }

      const patientData = {
        name,
        age: parseInt(document.getElementById('newAge').value) || null,
        phone: document.getElementById('newPhone').value || '',
        gender: document.getElementById('newGender').value,
      };

      if (SupabaseDB.isReady()) {
        try {
          const created = await SupabaseDB.createPatient(patientData);
          patients.unshift({
            id: created.id,
            ...patientData,
            status: '상담대기',
            lastVisit: new Date().toISOString().split('T')[0],
            score: 0,
            treatment: document.getElementById('newTreatment').value,
          });
          showToast(`${name} 환자가 Supabase에 등록되었습니다`, 'success');
        } catch (e) {
          showToast('Supabase 저장 실패: ' + e.message, 'error');
          return;
        }
      } else {
        patients.unshift({
          id: 'P' + String(patients.length + 1).padStart(3, '0'),
          ...patientData,
          age: patientData.age || 30,
          status: '상담대기',
          lastVisit: new Date().toISOString().split('T')[0],
          score: Math.floor(Math.random() * 40) + 40,
          treatment: document.getElementById('newTreatment').value,
        });
        showToast(`${name} 환자가 등록되었습니다 (로컬)`, 'success');
      }

      closeModal('addPatientModal');
      filterPatients();
    }

    renderTable(patients);
  </script>
</body>
</html>
